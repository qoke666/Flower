<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title id="page-title">Verdé · Цветы</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#0d1511}
body{font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent;color:#1F2C27}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{display:none}

:root{
  --emerald:#2A5C4D;--gold:#D4B88A;--dark:#1F2C27;--cream:#F8F5F0;--beige:#F0EDE6;
  --muted:rgba(31,44,39,0.45);--muted2:rgba(31,44,39,0.6);--line:rgba(31,44,39,0.08);
  --danger:#b94040;
  --clash:'Clash Display',sans-serif;--inter:'Inter',sans-serif;
}

/* ── APP SHELL ── */
#app{
  position:relative;width:min(390px,100vw);height:min(844px,100dvh);
  margin:0 auto;background:var(--cream);
  border-radius:clamp(0px,4vw,36px);overflow:hidden;
  box-shadow:0 64px 128px rgba(0,0,0,.6),0 0 0 1px rgba(0,0,0,.08);
  display:flex;flex-direction:column;
}

/* ── SCREENS ── */
.screen{flex:1;overflow-y:auto;overflow-x:hidden;display:none;background:var(--cream)}
.screen.active{display:block}
.screen.has-nav{padding-bottom:76px}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes revealX{from{clip-path:inset(0 100% 0 0)}to{clip-path:inset(0 0% 0 0)}}
.anim-title{animation:revealX 700ms cubic-bezier(.16,1,.3,1) both}
.anim-1{animation:fadeUp 500ms cubic-bezier(.16,1,.3,1) 80ms both}
.anim-2{animation:fadeUp 500ms cubic-bezier(.16,1,.3,1) 180ms both}
.anim-3{animation:fadeUp 500ms cubic-bezier(.16,1,.3,1) 280ms both}
.anim-4{animation:fadeUp 500ms cubic-bezier(.16,1,.3,1) 380ms both}

/* ── EYEBROW / TITLES ── */
.eyebrow{font-size:11px;font-weight:500;letter-spacing:6px;text-transform:uppercase;color:var(--gold)}
.h-big{font-family:var(--clash);font-weight:700;color:var(--dark);line-height:1;letter-spacing:-1px}

/* ── HEADER ── */
.scr-head{padding:56px 24px 20px}

/* ── HOME HERO (next order) ── */
.hero{margin:0 16px;border-radius:18px;overflow:hidden;position:relative;height:216px;background:var(--dark)}
.hero-img{position:absolute;right:0;top:-24px;height:240px;width:160px;object-fit:cover;z-index:1}
.hero-fade{position:absolute;right:0;top:0;bottom:0;width:180px;z-index:2;
  background:linear-gradient(to right,var(--dark) 0%,transparent 100%)}
.hero-body{position:absolute;inset:0;padding:24px;display:flex;flex-direction:column;justify-content:space-between;z-index:3}

/* ── CARD ── */
.card{background:var(--beige);border-radius:16px}

/* ── QUICK ACTIONS ── */
.qa-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.qa-btn{display:flex;flex-direction:column;align-items:center;gap:8px;padding:12px 0;border-radius:12px;transition:opacity .2s}
.qa-btn:active{opacity:.6}
.qa-ico{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;background:rgba(42,92,77,0.09)}
.qa-label{font-size:10px;text-align:center;line-height:1.15;font-weight:500;color:var(--dark)}

/* ── FLORIST CARDS (horizontal) ── */
.hscroll{display:flex;gap:12px;padding-left:24px;overflow-x:auto;scroll-snap-type:x mandatory}
.hscroll::after{content:'';flex:0 0 12px}
.florist-card{flex-shrink:0;width:200px;scroll-snap-align:start;background:var(--beige);border-radius:16px;overflow:hidden;text-align:left;transition:opacity .2s}
.florist-card:active{opacity:.8}
.florist-photo{position:relative;height:128px;overflow:hidden}
.florist-photo img{width:100%;height:100%;object-fit:cover;filter:saturate(.82) brightness(.93)}
.florist-photo .grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(31,44,39,.73) 0%,transparent 55%)}
.florist-photo .cap{position:absolute;bottom:12px;left:12px;right:12px}

/* ── SECTION HEAD ── */
.sec-head{padding:0 24px;display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px}
.sec-title{font-size:17px;font-family:var(--clash);font-weight:700;color:var(--dark)}
.sec-link{font-size:12px;font-weight:500;color:var(--emerald)}

/* ── CATALOG ── */
.searchbar{display:flex;align-items:center;gap:12px;padding:0 16px;height:48px;border-radius:12px;background:var(--beige);margin:0 16px}
.searchbar input{flex:1;background:transparent;border:none;outline:none;font-size:14px;color:var(--dark)}
.filter-row{display:flex;gap:8px;overflow-x:auto;padding:0 16px;margin:16px 0 20px}
.chip{flex-shrink:0;padding:7px 16px;border-radius:99px;font-size:12px;font-weight:500;background:var(--beige);color:var(--dark);transition:all .2s}
.chip.active{background:var(--emerald);color:var(--cream)}
.cat-lg{border-radius:18px;overflow:hidden;position:relative;height:252px;background:var(--beige);margin-bottom:12px}
.cat-lg img{width:100%;height:100%;object-fit:cover}
.cat-lg .grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(31,44,39,.87) 0%,transparent 48%)}
.cat-lg .body{position:absolute;bottom:0;left:0;right:0;padding:20px}
.cat-sm{flex:1;border-radius:18px;overflow:hidden;background:var(--beige)}
.cat-sm .ph{height:130px;overflow:hidden}
.cat-sm .ph img{width:100%;height:100%;object-fit:cover}

/* ── RATE BOUQUET (signature screen) ── */
#screen-rate .rate-wrap{padding:56px 20px 24px;min-height:100%;display:flex;flex-direction:column}
.rate-photo-card{position:relative;border-radius:24px;overflow:hidden;background:var(--dark);flex:1;min-height:380px;margin-bottom:20px}
.rate-photo-card img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.rate-photo-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(31,44,39,.85) 0%,transparent 45%)}
.rate-photo-meta{position:absolute;bottom:0;left:0;right:0;padding:22px}
.rate-actions{display:flex;gap:14px}
.rate-btn{flex:1;height:64px;border-radius:18px;display:flex;align-items:center;justify-content:center;gap:10px;
  font-size:16px;font-family:var(--clash);font-weight:600;transition:transform .15s,opacity .2s}
.rate-btn:active{transform:scale(.96)}
.rate-btn.like{background:var(--emerald);color:var(--cream)}
.rate-btn.dislike{background:var(--beige);color:var(--dark);border:1.5px solid var(--line)}
.rate-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:14px;padding:40px}
.rate-empty-ico{width:72px;height:72px;border-radius:50%;background:rgba(42,92,77,.1);display:flex;align-items:center;justify-content:center;font-size:32px}

/* redo comment box */
.redo-box{margin-top:16px;animation:fadeUp .3s ease both}
.redo-box textarea{width:100%;background:var(--beige);border:1px solid var(--line);border-radius:12px;
  padding:12px 14px;font-size:14px;color:var(--dark);resize:none;height:72px;outline:none;margin-bottom:12px}
.redo-box textarea:focus{border-color:var(--emerald)}

/* ── FLORIST PROFILE ── */
.fp-hero{position:relative;height:318px}
.fp-hero img{width:100%;height:100%;object-fit:cover;filter:grayscale(55%) brightness(.88)}
.fp-hero .tint{position:absolute;inset:0;background:rgba(42,92,77,.1);mix-blend-mode:multiply}
.fp-hero .grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(31,44,39,.93) 0%,rgba(31,44,39,.27) 52%,transparent 100%)}
.fp-back{position:absolute;top:48px;left:16px;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(31,44,39,.52);backdrop-filter:blur(6px);color:var(--cream);font-size:20px}
.fp-name{position:absolute;bottom:0;left:0;right:0;padding:0 24px 24px}
.fp-spec-side{position:absolute;right:20px;top:28%;writing-mode:vertical-rl;transform:rotate(180deg);font-size:10px;letter-spacing:4px;font-weight:500;color:rgba(240,237,230,.35)}
.fp-stats{margin:16px;border-radius:16px;overflow:hidden;background:var(--beige);display:grid;grid-template-columns:repeat(3,1fr)}
.fp-stat{display:flex;flex-direction:column;align-items:center;padding:20px 0}
.fp-stat:not(:last-child){border-right:1px solid var(--line)}
.portfolio{display:flex;gap:8px;overflow-x:auto;padding-left:24px}
.portfolio::after{content:'';flex:0 0 12px}
.portfolio .pit{flex-shrink:0;width:110px;height:110px;border-radius:12px;overflow:hidden}
.portfolio .pit img{width:100%;height:100%;object-fit:cover}

/* ── CONTACTS ── */
.contact-item{display:flex;align-items:center;gap:14px;background:var(--beige);border-radius:14px;
  padding:16px 18px;margin-bottom:12px;text-decoration:none;transition:opacity .2s}
.contact-item:active{opacity:.75}
.contact-ico{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:20px;background:rgba(42,92,77,.1);flex-shrink:0}
.contact-item h4{font-size:14px;font-weight:600;color:var(--dark);margin-bottom:2px}
.contact-item p{font-size:12px;color:var(--muted)}

/* ── PROFILE / LOYALTY ── */
.level-track{position:relative;margin-top:6px}
.benefit{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:12px;background:var(--beige);margin-bottom:8px}

/* ── BUILD (order flow) ── */
.step-dots{display:flex;gap:6px;margin-top:16px}
.step-dots .sd{height:3px;border-radius:99px;transition:all .4s;background:rgba(31,44,39,.14)}
.occ-btn{width:100%;display:flex;align-items:center;justify-content:between;padding:14px 20px;border-radius:12px;background:var(--beige);margin-bottom:8px;transition:all .2s;justify-content:space-between}
.occ-btn.sel{background:var(--dark)}
.slot-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.slot-cell{padding:14px;border-radius:12px;background:var(--beige);color:var(--dark);font-size:13px;font-weight:500;text-align:center;transition:all .2s}
.slot-cell.sel{background:var(--emerald);color:var(--cream)}
.date-cell{flex-shrink:0;display:flex;flex-direction:column;align-items:center;border-radius:12px;padding:12px 0;width:50px;background:var(--beige);transition:all .2s}
.date-cell.sel{background:var(--emerald)}
.primary-btn{width:100%;height:56px;border-radius:14px;background:var(--emerald);color:var(--cream);
  font-family:var(--clash);font-weight:600;font-size:15px;letter-spacing:.3px;transition:opacity .2s}
.primary-btn:active{opacity:.82}
.primary-btn:disabled{opacity:.45}

/* ── BOTTOM NAV ── */
#bottom-nav{
  position:absolute;bottom:0;left:0;right:0;height:64px;
  background:rgba(248,245,240,.94);border-top:1px solid var(--line);
  backdrop-filter:blur(14px);display:flex;align-items:center;padding:0 6px;z-index:50;
}
.nav-tab{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  flex:1;height:56px;border-radius:12px;color:var(--muted);transition:color .2s;font-size:10px;letter-spacing:.02em}
.nav-tab svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.nav-tab.active{color:var(--emerald)}
.nav-tab.active .nav-label{font-weight:600}

/* ── SPLASH ── */
#splash{position:absolute;inset:0;z-index:100;pointer-events:none;overflow:hidden}
.splash-half{position:absolute;left:0;right:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;overflow:hidden;transition:transform .6s cubic-bezier(.77,0,.175,1)}
#splash-top{top:0;height:50%;justify-content:flex-end;padding-bottom:12px}
#splash-bot{bottom:0;height:50%;justify-content:flex-start;padding-top:12px}
#splash.split #splash-top{transform:translateY(-100%)}
#splash.split #splash-bot{transform:translateY(100%)}
.splash-tagline{font-size:11px;font-weight:500;letter-spacing:8px;color:var(--gold);margin-bottom:16px;
  clip-path:inset(0 100% 0 0)}
.splash-tagline.show{animation:revealX .55s ease forwards}
.splash-logo{display:flex;overflow:hidden}
.splash-logo span{font-size:64px;font-family:var(--clash);font-weight:700;color:var(--beige);line-height:1;
  transform:translateY(110%);opacity:0}
.splash-logo span.show{animation:letterUp .5s cubic-bezier(.77,0,.175,1) forwards}
@keyframes letterUp{to{transform:translateY(0);opacity:1}}
.splash-sub{font-size:16px;font-weight:300;letter-spacing:3px;color:var(--gold);opacity:0;transform:translateY(20px)}
.splash-sub.show{animation:fadeUp .5s ease forwards}

/* ── TOAST ── */
#toast{position:absolute;bottom:80px;left:16px;right:16px;background:var(--dark);
  border-radius:12px;padding:13px 16px;display:flex;align-items:center;gap:10px;z-index:200;
  opacity:0;transform:translateY(12px);transition:all .3s cubic-bezier(.16,1,.3,1);pointer-events:none}
#toast.visible{opacity:1;transform:translateY(0)}
.toast-ico{font-size:16px;flex-shrink:0}
.toast-msg{font-size:13px;color:var(--cream);line-height:1.4}

/* ── MODAL ── */
.modal-overlay{position:absolute;inset:0;background:rgba(31,44,39,.55);backdrop-filter:blur(6px);
  z-index:150;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal-sheet{background:var(--cream);border-radius:22px 22px 0 0;padding:22px 20px 36px;width:100%;
  transform:translateY(100%);transition:transform .32s cubic-bezier(.16,1,.3,1)}
.modal-overlay.open .modal-sheet{transform:translateY(0)}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--line);margin:0 auto 18px}
.form-label{display:block;font-size:11px;color:var(--muted);margin-bottom:6px;letter-spacing:.05em;text-transform:uppercase}
.form-input,.form-select{width:100%;background:var(--beige);border:1px solid var(--line);border-radius:10px;
  padding:12px 14px;color:var(--dark);font-size:14px;margin-bottom:14px;outline:none;-webkit-appearance:none}
.form-input:focus,.form-select:focus{border-color:var(--emerald)}
.form-textarea{width:100%;background:var(--beige);border:1px solid var(--line);border-radius:10px;padding:12px 14px;color:var(--dark);font-size:14px;margin-bottom:14px;outline:none;resize:none;height:64px}
.form-textarea:focus{border-color:var(--emerald)}

/* ── BOUQUET DETAIL (modal) ── */
.bq-detail-photo{width:100%;height:320px;object-fit:cover;border-radius:18px;margin-bottom:16px}
.bq-detail-badge{display:inline-block;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--dark);background:var(--gold);padding:4px 12px;border-radius:99px;margin-bottom:10px}

/* ── QUICK ORDER ── */
.qo-date-row{display:flex;gap:8px;overflow-x:auto;margin-bottom:20px;padding-bottom:4px}
.qo-summary{display:flex;align-items:center;gap:14px;background:var(--beige);border-radius:14px;padding:14px;margin-bottom:20px}
.qo-summary img{width:56px;height:56px;border-radius:12px;object-fit:cover;flex-shrink:0}

/* Confirmation animation */
@keyframes checkPop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes ringExpand{0%{transform:scale(.6);opacity:.8}100%{transform:scale(1.9);opacity:0}}
.confirm-check{animation:checkPop .5s cubic-bezier(.34,1.56,.64,1) both}
.confirm-ring{position:absolute;inset:0;border-radius:50%;border:2px solid var(--emerald);animation:ringExpand 1s ease-out forwards}
.confirm-ring.d2{animation-delay:.3s}
</style>
</head>
<body>
<div id="app">
  <!-- screens injected below -->
  <!-- ═══ HOME ═══ -->
  <div id="screen-home" class="screen has-nav active"></div>
  <!-- ═══ CATALOG ═══ -->
  <div id="screen-catalog" class="screen has-nav"></div>
  <!-- ═══ RATE (signature) ═══ -->
  <div id="screen-rate" class="screen has-nav"></div>
  <!-- ═══ BUILD / ORDER ═══ -->
  <div id="screen-build" class="screen has-nav"></div>
  <!-- ═══ PROFILE ═══ -->
  <div id="screen-profile" class="screen has-nav"></div>
  <!-- ═══ CONTACTS ═══ -->
  <div id="screen-contacts" class="screen has-nav"></div>
  <!-- ═══ FLORIST PROFILE (no nav) ═══ -->
  <div id="screen-florist" class="screen"></div>

  <!-- ═══ BOTTOM NAV ═══ -->
  <nav id="bottom-nav">
    <button class="nav-tab active" data-screen="home" onclick="navigate('home')">
      <svg viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1h3a1 1 0 001-1V10"/></svg>
      <span class="nav-label">Главная</span>
    </button>
    <button class="nav-tab" data-screen="catalog" onclick="navigate('catalog')">
      <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
      <span class="nav-label">Каталог</span>
    </button>
    <button class="nav-tab" data-screen="rate" onclick="navigate('rate')">
      <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 000-7.78z"/></svg>
      <span class="nav-label">Оценить</span>
    </button>
    <button class="nav-tab" data-screen="build" onclick="navigate('build')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
      <span class="nav-label">Заказ</span>
    </button>
    <button class="nav-tab" data-screen="profile" onclick="navigate('profile')">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span class="nav-label">Профиль</span>
    </button>
    <button class="nav-tab" data-screen="contacts" onclick="navigate('contacts')">
      <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.62A2 2 0 012 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
      <span class="nav-label">Контакты</span>
    </button>
  </nav>

  <!-- ═══ SPLASH ═══ -->
  <div id="splash">
    <div class="splash-half" id="splash-top">
      <p class="splash-tagline" id="splash-tagline">FLOWERS · RITUAL</p>
      <div class="splash-logo" id="splash-logo"></div>
    </div>
    <div class="splash-half" id="splash-bot">
      <p class="splash-sub" id="splash-sub">Твой букет ждёт</p>
    </div>
  </div>

  <!-- ═══ TOAST ═══ -->
  <div id="toast"><span class="toast-ico" id="toast-ico">✓</span><span class="toast-msg" id="toast-msg"></span></div>

  <!-- ═══ ADD CONTACT MODAL placeholder ═══ -->
  <div class="modal-overlay" id="modal" onclick="closeModal(event)">
    <div class="modal-sheet" onclick="event.stopPropagation()" id="modal-body"></div>
  </div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
/* =====================================================================
 *  CONFIG — всё, что редактируется, здесь
 * ===================================================================== */
const CONFIG = {
  pageTitle: 'Verdé · Цветы',
  brand:     'VERDÉ',
  userName:  'Анна',
  userPhoto: 'https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=100&h=100&fit=crop&auto=format',

  // Backend (Google Apps Script Web App). Вставишь свой URL после деплоя.
  backendUrl: 'https://script.google.com/macros/s/AKfycbwucizcZebYhXNg1MO6hf0zY1UUHzp3md0LgVxbcxSe6a5jrvKjpM2OF-YotERxisrNIw/exec',

  // Флористы
  florists: [
    { id:1, name:'Мария Елисеева', spec:'Сезонные композиции', exp:'7 лет', rating:4.9, reviews:128,

function navigate(name){
  if(name===S.screen && name!=='florist') return;
  // Если уходим с быстрого заказа на ДРУГУЮ вкладку (не build) — сбрасываем его состояние
  if(S.quickBouquet && name!=='build'){ S.quickBouquet=null; S.qoConfirmed=false; S.orderInFlight=false; }
  $('screen-'+S.screen)?.classList.remove('active');
  $('screen-'+name)?.classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.toggle('active',b.dataset.screen===name));
  // hide bottom nav on florist detail
  $('bottom-nav').style.display = (name==='florist') ? 'none' : 'flex';
  S.screen=name;
  const r={home:renderHome,catalog:renderCatalog,rate:renderRate,build:renderBuild,
           profile:renderProfile,contacts:renderContacts}[name];
  if(r) r();
  $('screen-'+name).scrollTop=0;
}

function renderRateCard(){
  const c=$('rate-content'); if(!c) return;
  const b=S.pendingRate;
  if(!b){
    c.innerHTML=`<div class="rate-empty"><div class="rate-empty-ico">✓</div>
      <p style="font-size:16px;font-family:var(--clash);font-weight:600;color:var(--dark)">Всё оценено</p>
      <p style="font-size:13px;color:var(--muted2);max-width:240px">Когда флорист пришлёт фото нового букета, он появится здесь.</p></div>`;
    return;
  }
  c.innerHTML=`
    <div class="rate-photo-card anim-1">
      <img src="${b.photo}" alt="Ваш букет">
      <div class="rate-photo-grad"></div>
      <div class="rate-photo-meta">
        <p class="eyebrow" style="letter-spacing:4px;margin-bottom:6px">СОБРАЛ ФЛОРИСТ</p>
        <p style="font-size:22px;font-family:var(--clash);font-weight:700;color:#fff;line-height:1.1">${esc(b.florist||'Флорист Verdé')}</p>
        ${b.order_label?`<p style="font-size:12px;margin-top:4px;color:var(--gold)">${esc(b.order_label)}</p>`:''}
      </div>
    </div>
    <p style="text-align:center;font-size:13px;color:var(--muted2);margin-bottom:16px" class="anim-2">Нравится, как получилось? Подтвердите — и мы отправим на доставку.</p>
    <div class="rate-actions anim-2">
      <button class="rate-btn dislike" onclick="chooseRate('dislike')">🔄 Переделать</button>
      <button class="rate-btn like" onclick="chooseRate('like')">💚 Нравится</button>
    </div>
    <div id="redo-slot"></div>`;
}

function chooseRate(choice){
  S.rateChoice=choice;
  if(choice==='like'){ submitRate(''); return; }
  // dislike → показать поле комментария
  const slot=$('redo-slot');
  slot.innerHTML=`<div class="redo-box">
    <textarea id="redo-comment" placeholder="Что поправить? Цвет, размер, состав…"></textarea>
    <button class="primary-btn" style="background:var(--dark)" onclick="submitRate(document.getElementById('redo-comment').value.trim())">Отправить на переделку</button>
  </div>`;
  $('redo-comment').focus();
}

async function submitRate(comment){
  if(S.rateSubmitting || !S.pendingRate) return;
  S.rateSubmitting=true;
  const b=S.pendingRate, choice=S.rateChoice;

  try{
    if(b.booking_id!=='DEMO'){
      await apiFetch('POST',null,{
        event:'rate_bouquet', user_id:userId,
        username:tgUser.username||'', first_name:tgUser.first_name||'',
        booking_id:b.booking_id, choice, comment:comment||''
      });
    }
    showToast(choice==='like'?'Букет одобрен — везём вам! 💚':'Отправили флористу на переделку','ok');
    S.pendingRate=null; S.rateSubmitting=false;
    renderRateCard();
  }catch(e){
    S.rateSubmitting=false;
    showToast('Не удалось отправить. Попробуйте ещё раз','err');
  }
}

async function submitQuickOrder(){
  // Защита от повторных тапов
  if(S.qoSubmitting || S.orderInFlight){ return; }
  if(!S.qoDate || !S.qoSlot){ showToast('Выберите дату и время','err'); return; }
  S.qoSubmitting=true; S.orderInFlight=true;

  const btn=$('qo-submit');
  if(btn){ btn.disabled=true; btn.textContent='Оформляем…'; }

  const b=S.quickBouquet;
  const bookingId=`BK_${Date.now()}_${Math.random().toString(36).substr(2,5).toUpperCase()}`;
  try{
    const res=await apiFetch('POST',null,{
      event:'order_submit', user_id:userId,
      username:tgUser.username||'', first_name:tgUser.first_name||'',
      timestamp:new Date().toISOString(),
      order:{ booking_id:bookingId, occasion:b.name, florist:'', bouquet:b.name,
        price:b.price, date:S.qoDate?`${S.qoDate} июля`:'', slot:S.qoSlot||'',
        address:S.qoAddress||'', phone:tgUser.phone||'' }
    });
    // Если сервер отклонил дубль
    if(res && res.status==='duplicate'){
      S.qoSubmitting=false; S.orderInFlight=false;
      if(btn){ btn.disabled=false; btn.textContent='Оформить заказ · '+money(b.price)+' ₽'; }
      showToast(res.message||'У вас уже есть активный заказ','err');
      return;
    }
  }catch(e){ /* offline — всё равно показываем успех */ }

  S.qoSubmitting=false;
  S.qoConfirmed=true;
  // orderInFlight сбросим только когда пользователь уйдёт с экрана — чтобы не спамил
  renderBuild();
}

    <div style="padding:20px 24px 8px"><p style="font-size:13px;font-weight:600;color:var(--dark)" class="anim-2">Ваши флористы</p></div>
    <div style="padding:0 16px 24px" class="anim-2" id="contacts-florists"></div>`;

  $('contacts-shop').innerHTML=CONFIG.contacts.map(c=>{
    const tag=(c.href&&c.href!=='#')?'a':'div';
    const attr=(c.href&&c.href!=='#')?`href="${c.href}" target="_blank" rel="noopener"`:'';
    return `<${tag} class="contact-item" ${attr}><div class="contact-ico">${c.icon}</div>
      <div><h4>${esc(c.label)}</h4><p>${esc(c.sub)}</p></div></${tag}>`;
  }).join('');

  $('contacts-florists').innerHTML=CONFIG.florists.map(f=>`
    <a class="contact-item" href="${f.telegram}" target="_blank" rel="noopener">
      <div style="width:46px;height:46px;border-radius:12px;overflow:hidden;flex-shrink:0"><img src="${f.img}" style="width:100%;height:100%;object-fit:cover" alt=""></div>
      <div style="flex:1"><h4>${esc(f.name)}</h4><p>${esc(f.spec)}</p></div>
      <span style="font-size:12px;color:var(--emerald)">Написать →</span></a>`).join('');
}

/* =====================================================================
 *  API
 * ===================================================================== */
async function apiFetch(method, path, body){
  if(!CONFIG.backendUrl) throw new Error('no backend');
  const url=CONFIG.backendUrl+(path||'');
  if(method==='GET'){
    const r=await fetch(url); if(!r.ok) throw new Error('HTTP '+r.status); return r.json();
  }
  const r=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(body)});
  if(!r.ok) throw new Error('HTTP '+r.status); return r.json();
}

/* =====================================================================
 *  MODAL + TOAST
 * ===================================================================== */
function closeModal(e){ if(e===true||e.target===$('modal')) $('modal').classList.remove('open'); }
let _tt;
function showToast(msg,type='ok'){
  $('toast-ico').textContent=type==='err'?'!':'✓';
  $('toast-ico').style.color=type==='err'?'#ff8a8a':'var(--gold)';
  $('toast-msg').textContent=msg;
  $('toast').classList.add('visible');
  clearTimeout(_tt); _tt=setTimeout(()=>$('toast').classList.remove('visible'),4000);
}

 * ===================================================================== */
document.addEventListener('DOMContentLoaded',()=>{
  runSplash();
  renderHome();
});
